<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<!-- CSP : filet de sécurité — un contenu piégé reçu de la promo ne peut ni
     charger ni exécuter quoi que ce soit d'extérieur. wss: = P2P (relais). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://nominatim.openstreetmap.org https://gmail.googleapis.com https://www.googleapis.com https://graph.microsoft.com https://login.microsoftonline.com https://api.anthropic.com https://generativelanguage.googleapis.com wss:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-src 'none'">
<!-- aucun lien sortant ne dit d'où il vient (vie privée) -->
<meta name="referrer" content="no-referrer">
<title>OpenContact — le fil de ta recherche, partagé avec ta promo</title>
<meta name="description" content="OpenContact répond à « je fais quoi maintenant ? » dans ta recherche de stage, d'alternance ou d'emploi — et fait circuler les bonnes pistes dans ta promo. Local-first, sans compte, open source.">
<meta name="theme-color" id="metaTheme" content="#F7F6F1">
<meta property="og:type" content="website">
<meta property="og:title" content="OpenContact — pistes &amp; contacts partagés">
<meta property="og:description" content="Trouve, enrichis et partage des pistes de stage, d'alternance ou d'emploi avec ta promo. Local-first, sans compte, open source.">
<meta property="og:locale" content="fr_FR">
<meta name="twitter:card" content="summary">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OpenContact">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/logo/piste-a-reseau.svg">
<link rel="apple-touch-icon" href="icon.svg">
<!-- tokens puis mise en écran : en <link> plutôt qu'en @import, le
     navigateur télécharge tout en parallèle dès l'analyse du HTML -->
<link rel="stylesheet" href="styles/tokens/fonts.css">
<link rel="stylesheet" href="styles/tokens/colors.css">
<link rel="stylesheet" href="styles/tokens/typography.css">
<link rel="stylesheet" href="styles/tokens/spacing.css">
<link rel="stylesheet" href="styles/tokens/effects.css">
<link rel="stylesheet" href="styles/tokens/base.css">
<link rel="stylesheet" href="styles/app.css">
</head>
<body>
<noscript><div style="padding:20px;font-family:system-ui;text-align:center">OpenContact a besoin de JavaScript pour fonctionner — active-le dans ton navigateur.</div></noscript>
<a class="skip" href="#main">Aller au contenu</a>
<div class="app">

  <header class="hdr">
    <a class="brand" href="#/aujourdhui" aria-label="OpenContact — accueil">
      <!-- logo inliné : l'encre suit le thème (currentColor), l'accent reste teal -->
      <svg viewBox="0 0 32 32" width="22" height="22" shape-rendering="crispEdges" aria-hidden="true">
        <rect x="13" y="2" width="8" height="8" fill="#0B7268"></rect>
        <rect x="12" y="10" width="2" height="2" fill="currentColor"></rect>
        <rect x="10" y="12" width="2" height="2" fill="currentColor"></rect>
        <rect x="8" y="14" width="2" height="2" fill="currentColor"></rect>
        <rect x="6" y="16" width="2" height="2" fill="currentColor"></rect>
        <rect x="20" y="10" width="2" height="2" fill="currentColor"></rect>
        <rect x="22" y="12" width="2" height="2" fill="currentColor"></rect>
        <rect x="24" y="14" width="2" height="2" fill="currentColor"></rect>
        <rect x="13" y="24" width="2" height="2" fill="#8B94A0"></rect>
        <rect x="17" y="24" width="2" height="2" fill="#8B94A0"></rect>
        <path fill="currentColor" d="M3 18h8v8H3v-8Zm2 2v4h4v-4H5Z"></path>
        <path fill="currentColor" d="M21 18h8v8h-8v-8Zm2 2v4h4v-4h-4Z"></path>
      </svg>
      <b>OPEN-CONTACT</b>
    </a>
    <nav class="topnav" aria-label="Navigation principale">
      <a href="#/aujourdhui" data-r="aujourdhui">Aujourd’hui</a>
      <a href="#/pistes" data-r="pistes">Mes pistes</a>
      <a href="#/echanger" data-r="echanger">Échanger</a>
      <a href="#/moi" data-r="moi">Moi</a>
    </nav>
    <div class="hdr-actions">
      <button class="btn btn-ghost icon-btn" id="btnTheme" aria-label="Thème clair ou sombre" title="Thème clair / sombre"><span class="ic" style="-webkit-mask-image:url(assets/icons/invert.svg);mask-image:url(assets/icons/invert.svg)" aria-hidden="true"></span></button>
      <button class="btn btn-primary btn-cta" id="btnAddTop"><span class="ic ic-14" style="-webkit-mask-image:url(assets/icons/plus.svg);mask-image:url(assets/icons/plus.svg)" aria-hidden="true"></span> Ajouter une piste</button>
    </div>
  </header>

  <div class="save-warn" id="saveWarn" hidden role="alert">
    <span>Sauvegarde impossible ici — exporte avant de fermer.</span>
    <button id="swExport">Exporter</button>
  </div>

  <main class="main" id="main">
    <section class="view" id="view-aujourdhui" hidden aria-label="Aujourd’hui"></section>
    <section class="view" id="view-pistes" hidden aria-label="Mes pistes"></section>
    <section class="view" id="view-echanger" hidden aria-label="Échanger"></section>
    <section class="view" id="view-moi" hidden aria-label="Moi"></section>
  </main>

  <footer class="statusbar">
    <span><span class="ic ic-14" style="-webkit-mask-image:url(assets/icons/lock.svg);mask-image:url(assets/icons/lock.svg)" aria-hidden="true"></span> local &amp; privé — sans serveur</span>
    <span class="grow"></span>
    <span>OpenContact <span id="sbVer"></span></span>
  </footer>

  <nav class="bottomnav" aria-label="Navigation mobile">
    <a href="#/aujourdhui" data-r="aujourdhui"><span class="ic" style="-webkit-mask-image:url(assets/icons/zap.svg);mask-image:url(assets/icons/zap.svg)" aria-hidden="true"></span>Aujourd’hui</a>
    <a href="#/pistes" data-r="pistes"><span class="ic" style="-webkit-mask-image:url(assets/icons/briefcase.svg);mask-image:url(assets/icons/briefcase.svg)" aria-hidden="true"></span>Pistes</a>
    <button class="bn-add" id="bnAdd" aria-label="Ajouter une piste"><span class="ic ic-20" style="-webkit-mask-image:url(assets/icons/plus.svg);mask-image:url(assets/icons/plus.svg)" aria-hidden="true"></span></button>
    <a href="#/echanger" data-r="echanger"><span class="ic" style="-webkit-mask-image:url(assets/icons/share.svg);mask-image:url(assets/icons/share.svg)" aria-hidden="true"></span>Échanger</a>
    <a href="#/moi" data-r="moi"><span class="ic" style="-webkit-mask-image:url(assets/icons/user.svg);mask-image:url(assets/icons/user.svg)" aria-hidden="true"></span>Moi</a>
  </nav>

</div><!-- /.app -->

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="app.js"></script>
</body>
</html>
