# OpenContact — intégration continue.
# Quatre signaux séparés, du plus rapide au plus complet :
#  · pwa        : les auto-tests unitaires (?test) dans un vrai Chromium ;
#  · transport  : la sonde des relais Nostr publics réellement choisis par
#                 l'app — la CI rougit si le transport public est mort (#14) ;
#  · compagnon  : cargo test --locked + build release du binaire natif ;
#  · scenarios  : la suite de bout en bout entière (tests/e2e/tous.mjs),
#                 scénarios natifs compris — elle reconstruit le binaire
#                 et le pilote sous xvfb, comme en développement ; la
#                 liaison P2P y est jouée avec deux vrais navigateurs et
#                 un relais Nostr local (e2e-liaison.mjs).
# Aucun secret requis : tout tourne contre des doubles locaux, sauf la
# sonde transport qui parle volontairement au monde réel.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1,4'   # lundi & jeudi : le transport public se surveille même sans commit

jobs:
  transport:
    name: Transport public — relais joignables
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Sonde des relais réellement choisis par l'app
        run: OC_SONDE_RELAIS=1 node tests/e2e/sonde-relais-publics.mjs

  pwa:
    name: PWA — auto-tests unitaires
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Playwright + Chromium
        run: |
          npm i -g playwright
          playwright install --with-deps chromium
          echo "OC_PLAYWRIGHT=$(npm root -g)/playwright/index.mjs" >> "$GITHUB_ENV"
      - name: Auto-tests (?test)
        run: node tests/e2e/unitaires.mjs

  compagnon:
    name: Compagnon — cargo test + build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Dépendances système Tauri (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compagnon
      - name: Moteur partagé (preparer.mjs)
        run: node compagnon/preparer.mjs
      - name: Tests Rust (cœur + coquille)
        run: cargo test --locked --manifest-path compagnon/Cargo.toml
      - name: Build release du binaire
        run: cargo build --locked --release -p oc-compagnon --manifest-path compagnon/Cargo.toml

  scenarios:
    name: Bout en bout — suite complète (vrai binaire)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Playwright + Chromium
        run: |
          npm i -g playwright
          playwright install --with-deps chromium
          echo "OC_PLAYWRIGHT=$(npm root -g)/playwright/index.mjs" >> "$GITHUB_ENV"
      - name: Dépendances système Tauri + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev \
            xvfb dbus-x11
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compagnon
      - name: Moteur partagé (preparer.mjs)
        run: node compagnon/preparer.mjs
      - name: Suite complète (unitaires + scénarios, natifs compris)
        run: node tests/e2e/tous.mjs
      - name: Captures d'écran des scénarios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captures
          path: tests/e2e/captures/
          if-no-files-found: ignore
