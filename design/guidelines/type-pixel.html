<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface-window);padding:18px 22px;display:flex;flex-direction:column;gap:10px">
  <div style="font-family:var(--font-pixel);font-size:24px;line-height:1.2">OPEN-CONTACT</div>
  <div style="display:flex;gap:18px;align-items:baseline">
    <span style="font-family:var(--font-pixel);font-size:16px">PISTES &amp; CONTACTS</span>
    <span style="font-family:var(--font-pixel);font-size:8px">BARRE DE TITRE — V1.0 — PRIVE</span>
  </div>
  <div style="font-size:12px;color:var(--text-muted);line-height:1.55;max-width:560px">
    Silkscreen est dessinée sur grille : ne l'utiliser qu'à <b>8, 16 ou 24px</b> — jamais entre deux.
    Réservée aux capitales : wordmark, barres de titre, badges, touches clavier, numéros de version. Jamais pour un paragraphe.
  </div>
</body></html>
