<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface-window);padding:18px 22px">
  <div style="display:flex;align-items:flex-end;gap:14px">
    <div style="text-align:center"><div style="width:2px;height:2px;background:var(--teal);border:0;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">1·2px</div></div>
    <div style="text-align:center"><div style="width:4px;height:4px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">2·4px</div></div>
    <div style="text-align:center"><div style="width:8px;height:8px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">3·8px</div></div>
    <div style="text-align:center"><div style="width:12px;height:12px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">4·12px</div></div>
    <div style="text-align:center"><div style="width:16px;height:16px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">5·16px</div></div>
    <div style="text-align:center"><div style="width:24px;height:24px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">6·24px</div></div>
    <div style="text-align:center"><div style="width:32px;height:32px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">7·32px</div></div>
    <div style="text-align:center"><div style="width:48px;height:48px;background:var(--teal);margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px">8·48px</div></div>
    <div style="font-size:12px;color:var(--text-muted);max-width:200px;line-height:1.5;padding-bottom:4px">Tout tombe sur la grille 4px. Padding de fenêtre : 16px. Gouttière de page : 24px.</div>
  </div>
</body></html>
