<!-- @dsCard group="Effects" viewport="700x190" subtitle="Biseaux 1px + ombres dures sans flou" name="Relief & ombres" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface-desktop);padding:22px;display:flex;gap:20px;align-items:center">
  <div style="width:110px;height:64px;background:var(--surface-chrome);border:1px solid var(--border-strong);border-radius:2px;box-shadow:var(--bevel-up), var(--shadow-raised);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600">relevé</div>
  <div style="width:110px;height:64px;background:var(--surface-chrome);border:1px solid var(--border-strong);border-radius:2px;box-shadow:var(--bevel-down);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600">enfoncé</div>
  <div style="width:110px;height:64px;background:var(--surface-field);border:1px solid var(--border-field);border-radius:2px;box-shadow:var(--bevel-field);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600">en creux</div>
  <div style="width:110px;height:64px;background:var(--surface-window);border:1px solid var(--border-strong);box-shadow:var(--shadow-window);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600">fenêtre 4px</div>
  <div style="font-size:12px;color:var(--text-muted);line-height:1.6;flex:1">Trois reliefs, un langage. Les ombres sont <b>décalées et nettes</b> — le flou n'existe pas dans ce système. Presse d'un bouton : l'ombre disparaît, l'élément se déplace de 2px.</div>
</body></html>
