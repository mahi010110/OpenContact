<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.sw{flex:1;display:flex;flex-direction:column;gap:0}
.sw .c{height:64px;border:1px solid var(--border-strong)}
.sw .n{font-family:var(--font-mono);font-size:10.5px;padding:5px 2px 0;color:var(--text-body)}
.sw .v{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);padding:0 2px}
</style></head>
<body style="margin:0;background:var(--surface-window);padding:16px 22px">
  <div style="display:flex;gap:8px">
    <div class="sw"><div class="c" style="background:#FFFFFF"></div><div class="n">--gray-0</div><div class="v">#FFFFFF · champs</div></div>
    <div class="sw"><div class="c" style="background:#F7F6F1"></div><div class="n">--gray-1</div><div class="v">#F7F6F1 · fenêtres</div></div>
    <div class="sw"><div class="c" style="background:#ECEAE2"></div><div class="n">--gray-2</div><div class="v">#ECEAE2 · chrome</div></div>
    <div class="sw"><div class="c" style="background:#DDDACE"></div><div class="n">--gray-3</div><div class="v">#DDDACE · appuyé</div></div>
    <div class="sw"><div class="c" style="background:#E7E5DD"></div><div class="n">--gray-desktop</div><div class="v">#E7E5DD · bureau</div></div>
    <div class="sw"><div class="c" style="background:#5C6672"></div><div class="n">--ink-2</div><div class="v">#5C6672 · secondaire</div></div>
    <div class="sw"><div class="c" style="background:#1D242C"></div><div class="n">--ink</div><div class="v">#1D242C · encre</div></div>
  </div>
</body></html>
