<!-- @dsCard group="Colors" viewport="700x230" subtitle="Anthracite doux, accent lumineux — pas une inversion" name="Mode sombre" -->
<!DOCTYPE html>
<html lang="fr" data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.sw{flex:1;display:flex;flex-direction:column}
.sw .c{height:48px;border:1px solid var(--border-soft)}
.sw .n{font-family:var(--font-mono);font-size:10.5px;padding:4px 2px 0;color:var(--text-body)}
.sw .v{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);padding:0 2px}
</style></head>
<body style="margin:0;background:var(--surface-desktop);padding:16px 22px;color:var(--text-body)">
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <div class="sw"><div class="c" style="background:#15181D"></div><div class="n">desktop</div><div class="v">#15181D</div></div>
    <div class="sw"><div class="c" style="background:#12151A"></div><div class="n">--gray-0</div><div class="v">#12151A · champs</div></div>
    <div class="sw"><div class="c" style="background:#1E232B"></div><div class="n">--gray-1</div><div class="v">#1E232B · fenêtres</div></div>
    <div class="sw"><div class="c" style="background:#262C35"></div><div class="n">--gray-2</div><div class="v">#262C35 · chrome</div></div>
    <div class="sw"><div class="c" style="background:#3BC9BA"></div><div class="n">--teal</div><div class="v">#3BC9BA · accent</div></div>
    <div class="sw"><div class="c" style="background:#4A5BC4"></div><div class="n">--navy</div><div class="v">#4A5BC4 · sélection</div></div>
    <div class="sw"><div class="c" style="background:#E9ECEF"></div><div class="n">--ink</div><div class="v">#E9ECEF · encre claire</div></div>
  </div>
  <div style="border:1px solid var(--border-strong);background:var(--surface-window);box-shadow:var(--shadow-raised);padding:10px 12px;font-size:13px">
    Les bordures fortes passent en <b>gris clair</b> : l'interface devient filaire.
    <a href="#" style="margin-left:8px">Un lien teal lumineux</a>
    <span style="background:var(--select-bg);color:var(--select-text);padding:1px 4px;margin-left:8px">sélection marine</span>
  </div>
</body></html>
