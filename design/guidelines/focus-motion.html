<!-- @dsCard group="Effects" viewport="700x170" subtitle="Focus pointillé 98 · sélection marine · mouvement en pas" name="Focus, sélection & mouvement" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface-window);padding:20px 22px;display:flex;gap:22px;align-items:center">
  <div style="padding:8px 14px;border:1px solid var(--border-strong);border-radius:2px;background:var(--surface-chrome);box-shadow:var(--bevel-up);font-size:13px;font-weight:600;outline:1px dotted var(--focus-ring);outline-offset:2px">Focus clavier</div>
  <div style="font-size:14px;max-width:190px;line-height:1.5">Une piste <span style="background:var(--select-bg);color:var(--select-text);padding:0 2px">sélectionnée à la souris</span> dans une liste.</div>
  <div style="font-size:12px;color:var(--text-muted);line-height:1.6;flex:1">
    <b style="color:var(--text-body)">Mouvement :</b> les états changent instantanément (0ms), les menus apparaissent en 120ms, les modales en 180ms.
    Les déplacements se font <b>en pas</b> (steps) plutôt qu'en glissé — l'interface claque, elle ne flotte pas.
  </div>
</body></html>
