<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface-window);padding:18px 22px;display:flex;gap:18px;align-items:center">
  <div style="text-align:center">
    <div style="width:120px;height:56px;border:1px solid var(--border-strong);background:var(--surface-chrome);background-image:var(--dither)"></div>
    <div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px;color:var(--text-muted)">--dither · 14%</div>
  </div>
  <div style="text-align:center">
    <div style="width:120px;height:56px;border:1px solid var(--border-strong);background:var(--surface-chrome);background-image:var(--dither-strong)"></div>
    <div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px;color:var(--text-muted)">--dither-strong · 28%</div>
  </div>
  <div style="text-align:center">
    <div style="width:120px;height:56px;border:1px solid var(--border-strong);background:var(--surface-chrome);background-image:var(--scanlines)"></div>
    <div style="font-family:var(--font-mono);font-size:10.5px;margin-top:6px;color:var(--text-muted)">--scanlines</div>
  </div>
  <div style="font-size:12px;color:var(--text-muted);line-height:1.6;flex:1">Où : barres de titre inactives, badge PRIVÉ, onglets inactifs, voile de modale, en-têtes décoratifs. Jamais derrière un paragraphe.</div>
</body></html>
