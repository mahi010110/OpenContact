<!-- @dsCard group="Spacing" viewport="700x180" subtitle="Coins carrés, bordures 1px, contrôles 24/32/40px" name="Géométrie" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--surface-window);padding:18px 22px;display:flex;gap:24px;align-items:flex-start">
  <div>
    <div style="display:flex;gap:10px;align-items:flex-end">
      <div style="width:72px;height:24px;border:1px solid var(--border-strong);border-radius:2px;background:var(--surface-chrome);display:flex;align-items:center;justify-content:center;font-size:11px">sm 24</div>
      <div style="width:84px;height:32px;border:1px solid var(--border-strong);border-radius:2px;background:var(--surface-chrome);display:flex;align-items:center;justify-content:center;font-size:12px">md 32</div>
      <div style="width:96px;height:40px;border:1px solid var(--border-strong);border-radius:2px;background:var(--surface-chrome);display:flex;align-items:center;justify-content:center;font-size:13px">lg 40</div>
      <div style="width:96px;height:44px;border:1px solid var(--border-strong);border-radius:2px;background:var(--surface-chrome);display:flex;align-items:center;justify-content:center;font-size:13px">tactile 44</div>
    </div>
    <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);margin-top:8px">hauteurs de contrôle</div>
  </div>
  <div style="font-size:12.5px;color:var(--text-muted);line-height:1.6;max-width:280px">
    <b style="color:var(--text-body)">Rayon : 0 ou 2px.</b> Rien d'autre — pas de pilule, pas de 8px.
    Bordures : 1px encre. Le seul cercle autorisé : le bouton radio et les pins de carte.
  </div>
</body></html>
